<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPN Submission Portal – Login</title>
  <link rel="stylesheet" href="/static/css/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="login-page">

  <!-- Animated background grid -->
  <div class="bg-grid"></div>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="login-container">
    <!-- Header -->
    <div class="login-header">
      <div class="logo-badge">GPN</div>
      <h1>Government Polytechnic Nagpur</h1>
      <p>Department of Computer Engineering</p>
      <p class="portal-label">Assignment and Practical Submission Portal</p>
    </div>

    <!-- Role tabs -->
    <div class="role-tabs">
      <button class="tab-btn active" data-role="student" onclick="switchRole('student')">
        <span class="tab-icon">🎓</span> Student
      </button>
      <button class="tab-btn" data-role="faculty" onclick="switchRole('faculty')">
        <span class="tab-icon">👨‍🏫</span> Faculty
      </button>
    </div>

    <!-- Login form -->
    <form id="loginForm" class="login-form" novalidate>
      <div class="form-group">
        <label id="identifierLabel" for="identifier">Enrollment Number</label>
        <input
          type="text"
          id="identifier"
          name="identifier"
          placeholder="e.g. 2200100001"
          autocomplete="username"
          required
        />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrap">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />
          <button type="button" class="toggle-pw" onclick="togglePassword()" title="Show/hide password">👁</button>
        </div>
      </div>

      <!-- Alert box -->
      <div id="alertBox" class="alert hidden"></div>

      <button type="submit" class="btn-primary" id="loginBtn">
        <span id="btnText">Sign In</span>
        <span id="btnLoader" class="spinner hidden"></span>
      </button>
    </form>

    <p class="login-footer">Academic Year 2025-26&nbsp;|&nbsp; CM Department - EVEN-2026</p>
  </div>

  <script src="/static/js/login.js"></script>
</body>
</html>
